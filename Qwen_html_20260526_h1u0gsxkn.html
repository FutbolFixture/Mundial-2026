            --text: #1a1a1a;
            --text-light: #666;

        header { background: var(--primary); color: white; padding: 20px; text-align: center; position: relative; overflow: hidden; }

        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: 0.5px; }
        .subtitle { font-size: 0.95rem; opacity: 0.9; margin-top: 4px; }
        
        nav { background: white; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-weight: 600; color: var(--text-light); border-radius: 8px; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-btn:hover { background: #eee; }
        
        .controls { padding: 15px; max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .controls-left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .controls-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        select { padding: 10px 15px; border: 1px solid var(--border); border-radius: 6px; background: white; cursor: pointer; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-today { background: var(--accent); color: var(--primary); }
        .btn-reset { background: var(--danger); color: white; }
        .btn-clear { background: var(--text-light); color: white; }
        .hidden { display: none !important; }
        
        main { max-width: 1000px; margin: 0 auto; padding: 0 15px; }
        .view { display: none; animation: fade 0.3s ease; }
        .view.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .match-card { background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 12px; box-shadow: var(--shadow); display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        .match-date { font-size: 0.85rem; color: var(--text-light); min-width: 100%; margin-bottom: 5px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px; }
        .match-date span.group-badge { background: var(--secondary); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
        .teams { flex: 1; display: flex; align-items: center; justify-content: space-between; font-weight: 600; flex-wrap: wrap; gap: 10px; }
        .team { display: flex; align-items: center; gap: 8px; }
        .flag { font-size: 1.5rem; line-height: 1; }
        .vs { color: var(--text-light); font-size: 0.9rem; margin: 0 8px; }
        .score-inputs { display: flex; gap: 5px; align-items: center; }
        .score-inputs input { width: 40px; padding: 8px; text-align: center; font-weight: bold; border: 2px solid var(--border); border-radius: 6px; }
        .score-inputs input:focus { border-color: var(--primary); outline: none; }
        .stadium, .transmission { font-size: 0.85rem; color: var(--text-light); margin-top: 4px; min-width: 100%; display: flex; align-items: center; gap: 5px; }
        .transmission span { font-weight: 600; color: var(--primary); }
        .time-ar { background: #fff3cd; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; color: #856404; }
        
        .group-table { background: var(--card); border-radius: 10px; margin-bottom: 20px; overflow: hidden; box-shadow: var(--shadow); }
        .group-title { background: var(--primary); color: white; padding: 12px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
        th { background: #f8f9fa; font-weight: 600; color: var(--text-light); }
        td:first-child, th:first-child { text-align: left; font-weight: 600; }
        tr:nth-child(even) { background: #fafafa; }
        tr.top-2 { background: #e8f5e9; border-left: 4px solid var(--secondary); }

        .venue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .venue-card { background: var(--card); padding: 15px; border-radius: 10px; box-shadow: var(--shadow); }
        .venue-card h3 { margin-bottom: 5px; color: var(--primary); }
        .venue-card p { font-size: 0.85rem; color: var(--text-light); }

        .empty-state { text-align: center; padding: 40px; background: var(--card); border-radius: 10px; margin-top: 20px; box-shadow: var(--shadow); }
        .empty-state h2 { color: var(--primary); margin-bottom: 10px; }
        .empty-state p { color: var(--text-light); margin-bottom: 20px; }

        @media (max-width: 600px) {
            .controls { flex-direction: column; align-items: stretch; }
            .controls-left, .controls-right { justify-content: center; }
            .teams { flex-direction: column; gap: 5px; text-align: center; }
            .score-inputs { margin: 5px 0; }
        }
    </style>
</head>

        const offset = stadiumTimeZones[stadium] || 2;
        const [hours, minutes] = time.split(':').map(Number);
        let newHours = hours + offset;
        let dayOffset = 0;
        if (newHours >= 24) { newHours -= 24; dayOffset = 1; }
        else if (newHours < 0) { newHours += 24; dayOffset = -1; }
        return { time: `${String(newHours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`, dayOffset };

            return 'Directv Sports / Telefe / TV Pública';
        }
        return 'Directv Sports';
    }

    function renderMatches() {
        const container = document.getElementById('matches');
        const filter = filterSelect.value;
        container.innerHTML = '';
        
        let filtered = filter === 'all' ? matchesData : matchesData.filter(m => m.g === filter);
        if (dateFilter) {
            filtered = filtered.filter(m => m.d === dateFilter);
        }

        if (dateFilter && filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <h2>📅 ${formatDate(dateFilter)}</h2>
                    <h1>SIN PARTIDOS HOY</h1>
                    <p>No hay partidos programados para hoy en Argentina.</p>
                    <button class="btn-today" onclick="clearDateFilterAction()">Ver Todos los Partidos</button>
                </div>
            `;
            return;
        }

        if (filtered.length === 0) {
            container.innerHTML = '<p style="text-align:center;padding:20px;color:#666">No hay partidos para este filtro.</p>';
            return;
        }

        const scores = loadScores();
        filtered.forEach(m => {
            const s = scores[m.id] || {s1:'', s2:''};
            const argTime = convertToArgentinaTime(m.s, m.t);
            const displayDate = adjustDate(m.d, argTime.dayOffset);
            const dateDisplay = argTime.dayOffset !== 0 ? `${formatDate(displayDate)}*` : formatDate(m.d);
            const transmission = getTransmission(m);
            
            const card = document.createElement('div');
            card.className = 'match-card';
            card.innerHTML = `
                <div class="match-date">
                    <span>${dateDisplay} • <span class="time-ar">🇦🇷 ${argTime.time} ART</span></span>
                    <span class="group-badge">GRUPO ${m.g}</span>
                </div>
                <div class="teams">
                    <div class="team"><span class="flag">${flags[m.t1] || '🏳️'}</span><span>${m.t1}</span></div>
                    <span class="vs">VS</span>
                    <div class="team"><span>${m.t2}</span><span class="flag">${flags[m.t2] || '🏳️'}</span></div>
                </div>
                <div class="score-inputs">
                    <input type="number" min="0" max="99" data-id="${m.id}" data-side="1" value="${s.s1}" placeholder="-">
                    <span>-</span>
                    <input type="number" min="0" max="99" data-id="${m.id}" data-side="2" value="${s.s2}" placeholder="-">
                </div>
                <div class="stadium">📍 ${m.s}</div>
                <div class="transmission">📺 Transmisión: <span>${transmission}</span></div>
            `;
            container.appendChild(card);
        });
        attachInputListeners();
    }

    function attachInputListeners() {
        document.querySelectorAll('.score-inputs input').forEach(inp => {
            inp.addEventListener('input', (e) => {
                const id = e.target.dataset.id;
                const card = e.target.closest('.match-card');
                const inputs = card.querySelectorAll('input');
                saveScores(id, inputs[0].value, inputs[1].value);
                if(document.getElementById('standings').classList.contains('active')) renderStandings();
            });
        });
    }

    function renderStandings() {
        const container = document.getElementById('standings');
        container.innerHTML = '';
        const scores = loadScores();
        const filter = filterSelect.value;
        const activeGroups = filter === 'all' ? groups : [filter];

        activeGroups.forEach(g => {
            const teams = {};
            matchesData.filter(m => m.g === g).forEach(m => {
                if(!teams[m.t1]) teams[m.t1] = {name:m.t1, pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0};
                if(!teams[m.t2]) teams[m.t2] = {name:m.t2, pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0};
                
                const res = scores[m.id];
                if(res && res.s1 !== '' && res.s2 !== '') {
                    const s1 = parseInt(res.s1), s2 = parseInt(res.s2);
                    teams[m.t1].pj++; teams[m.t2].pj++;
                    teams[m.t1].gf += s1; teams[m.t1].gc += s2;
                    teams[m.t2].gf += s2; teams[m.t2].gc += s1;
                    if(s1 > s2) { teams[m.t1].g++; teams[m.t1].pts += 3; teams[m.t2].p++; }
                    else if(s2 > s1) { teams[m.t2].g++; teams[m.t2].pts += 3; teams[m.t1].p++; }
                    else { teams[m.t1].e++; teams[m.t2].e++; teams[m.t1].pts++; teams[m.t2].pts++; }
                }
            });

            const sorted = Object.values(teams).sort((a,b) => b.pts - a.pts || (b.gf-b.gc) - (a.gf-a.gc) || b.gf - a.gf);
            
            const tableDiv = document.createElement('div');
            tableDiv.className = 'group-table';
            let html = `<div class="group-title">GRUPO ${g}</div><table><thead><tr><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th></tr></thead><tbody>`;
            sorted.forEach((t, i) => {
                const cls = i < 2 ? 'class="top-2"' : '';
                const flag = flags[t.name] || '🏳️';
                html += `<tr ${cls}><td>${flag} ${t.name}</td><td>${t.pj}</td><td>${t.g}</td><td>${t.e}</td><td>${t.p}</td><td>${t.gf}</td><td>${t.gc}</td><td>${t.gf-t.gc}</td><td><strong>${t.pts}</strong></td></tr>`;
            });
            html += `</tbody></table>`;
            tableDiv.innerHTML = html;
            container.appendChild(tableDiv);
        });
    }

    function renderVenues() {
        const container = document.getElementById('venues');
        if(container.children.length > 0) return;
        
        const venueMap = {};
        matchesData.forEach(m => {
            if(!venueMap[m.s]) venueMap[m.s] = {name: m.s, matches: 0};
            venueMap[m.s].matches++;
        });
        
        const grid = document.createElement('div');
        grid.className = 'venue-grid';
        Object.values(venueMap).sort((a,b) => b.matches - a.matches).forEach(v => {
            const card = document.createElement('div');
            card.className = 'venue-card';
            card.innerHTML = `<h3>${v.name}</h3><p>🏟️ ${v.matches} partidos programados</p>`;
            grid.appendChild(card);
        });
        container.appendChild(grid);
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            btn.classList.add('active');
            const viewId = btn.dataset.view;
            document.getElementById(viewId).classList.add('active');
            if(viewId === 'standings') renderStandings();
            if(viewId === 'venues') renderVenues();
        });
    });

    filterSelect.addEventListener('change', () => {
        renderMatches();
        if(document.getElementById('standings').classList.contains('active')) renderStandings();
    });

    todayBtn.addEventListener('click', () => {
        dateFilter = getArgentinaDateString();
        clearDateFilterBtn.classList.remove('hidden');
        renderMatches();
    });

    window.clearDateFilterAction = function() {
        dateFilter = null;
        clearDateFilterBtn.classList.add('hidden');
        renderMatches();
    };
    
    clearDateFilterBtn.addEventListener('click', () => window.clearDateFilterAction());

    resetBtn.addEventListener('click', () => {
        if(confirm('¿Estás seguro de que quieres borrar todos los marcadores guardados?')) {
            localStorage.removeItem('wc2026_scores');
            renderMatches();
            if(document.getElementById('standings').classList.contains('active')) renderStandings();
        }
    });

    renderMatches();
</script>
</body>
</html>
