        .tab-btn.active { background: var(--primary); color: white; }
        .controls { padding: 12px 15px; max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .controls-left, .controls-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        select { padding: 10px 15px; border: 1px solid var(--border); border-radius: 8px; background: white; cursor: pointer; }

        .team-block { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 120px; padding: 6px; border-radius: 8px; transition: background 0.2s; }

        .score-controller { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px; }
        .score-unit { display: flex; align-items: center; gap: 6px; }

        .score-btn:active { transform: scale(0.9); background: #eef1f6; }
        .score-btn.minus { color: var(--danger); border-color: #ffcdd2; }
        .score-btn.plus { color: var(--secondary); border-color: #c8e6c9; }
        .score-display { font-size: 1.8rem; font-weight: 800; min-width: 40px; text-align: center; color: var(--text); }

        .penalty-result { margin-top: 6px; font-weight: bold; color: var(--secondary); font-size: 0.9rem; }

        th { background: #f8f9fa; font-weight: 600; color: var(--text-light); }
        td:first-child, th:first-child { text-align: left; font-weight: 600; }
        tr:nth-child(even) { background: #fafafa; }
        tr.top-2 { background: #e8f5e9; border-left: 4px solid var(--secondary); }

    const filterSelect = document.getElementById('groupFilter');
    const resetBtn = document.getElementById('resetScores');
    const todayBtn = document.getElementById('todayBtn');
    const clearDateFilterBtn = document.getElementById('clearDateFilter');

    Object.keys(groupLabels).forEach(g => {
        const opt = document.createElement('option'); opt.value = g; opt.textContent = groupLabels[g]; filterSelect.appendChild(opt);
    });

    let dateFilter = null;
    const formatDate = d => new Date(d+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const loadScores = () => JSON.parse(localStorage.getItem('wc2026_scores')) || {};
    const loadPenalties = () => JSON.parse(localStorage.getItem('wc2026_penalties')) || {};
    const loadTeams = () => JSON.parse(localStorage.getItem('wc2026_teams')) || {};
    
    let currentSlot = null; // {matchId, slot}

    window.openTeamModal = (matchId, slot) => {
        currentSlot = { matchId, slot };
        document.getElementById('teamModal').style.display = 'flex';
        document.getElementById('teamSearch').value = '';
        renderTeamGrid(allTeams);
    };

    function renderTeamGrid(teams) {
        const grid = document.getElementById('teamGrid');
        grid.innerHTML = '';
        teams.forEach(t => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerHTML = `<span style="font-size:1.8rem;">${flags[t]||'🏳️'}</span><span>${t}</span>`;
            div.onclick = () => selectTeam(t);
            grid.appendChild(div);
        });
    }

    window.filterTeams = () => {
        const query = document.getElementById('teamSearch').value.toLowerCase();
        const filtered = allTeams.filter(t => t.toLowerCase().includes(query));
        renderTeamGrid(filtered);
    };

    window.selectTeam = (team) => {
        if(!currentSlot) return;
        const teams = loadTeams();
        const key = `m${currentSlot.matchId}_${currentSlot.slot}`;
        teams[key] = team;
        localStorage.setItem('wc2026_teams', JSON.stringify(teams));

        // Lógica de flujo continuo: verificar si el otro slot está vacío o es placeholder
        const match = matchesData.find(m => m.id == currentSlot.matchId);
        const otherSlot = currentSlot.slot === 't1' ? 't2' : 't1';
        const otherTeamName = match[otherSlot];
        const isOtherSlotFilled = teams[`m${currentSlot.matchId}_${otherSlot}`] && 
                                  allTeams.includes(teams[`m${currentSlot.matchId}_${otherSlot}`]);

        if (match && !isOtherSlotFilled && allTeams.includes(otherTeamName) === false) {
            // Transición automática al otro equipo
            currentSlot.slot = otherSlot;
            document.getElementById('teamSearch').value = '';
            renderTeamGrid(allTeams);
            // Opcional: actualizar título del modal
            document.getElementById('modalTitle').textContent = `Ahora selecciona: ${otherTeamName}`;
            return;
        }
        
        // Si ambos están definidos o no es necesario seleccionar más, cerrar
        closeTeamModal();
        renderMatches();
    }

    window.closeTeamModal = () => { 
        document.getElementById('teamModal').style.display = 'none'; 
        currentSlot = null; 
    };

    function updateMatchScore(id, side, delta) {
        const scores = loadScores(); if(!scores[id]) scores[id] = {s1:0, s2:0};
        scores[id][side] = Math.max(0, Math.min(99, scores[id][side] + delta));
        localStorage.setItem('wc2026_scores', JSON.stringify(scores));
        updateScoreUI(id);
        if(document.getElementById('standings').classList.contains('active')) renderStandings();
        showSaveIndicator(id); animateScore(id, side);
        renderMatches();
    }

    window.setScoreToZero = function(id) {
        const scores = loadScores(); scores[id] = {s1:0, s2:0};
        localStorage.setItem('wc2026_scores', JSON.stringify(scores));
        updateScoreUI(id); renderMatches();
        if(document.getElementById('standings').classList.contains('active')) renderStandings();
        showSaveIndicator(id);
    }

    function clearMatchScore(id) {
        const scores = loadScores(); delete scores[id];
        const pen = loadPenalties(); delete pen[id];
        localStorage.setItem('wc2026_scores', JSON.stringify(scores));
        localStorage.setItem('wc2026_penalties', JSON.stringify(pen));
        updateScoreUI(id); renderMatches();
        if(document.getElementById('standings').classList.contains('active')) renderStandings();
    }

    function updateScoreUI(id) {
        const scores = loadScores();
        const s1 = scores[id] ? scores[id].s1 : 0, s2 = scores[id] ? scores[id].s2 : 0;
        const d1 = document.getElementById(`d-${id}-1`), d2 = document.getElementById(`d-${id}-2`), cb = document.getElementById(`c-${id}`);
        if(d1) d1.textContent = s1; if(d2) d2.textContent = s2;
        if(cb) cb.classList.toggle('hidden', s1===0 && s2===0);
    }

    function animateScore(id, side) {
        const el = document.getElementById(`d-${id}-${side==='s1'?'1':'2'}`);
        if(!el) return; el.classList.remove('updated'); void el.offsetWidth; el.classList.add('updated');
    }

    function showSaveIndicator(id) {
        const ind = document.getElementById(`sav-${id}`); if(!ind) return;
        ind.classList.add('show'); setTimeout(()=>ind.classList.remove('show'), 700);
    }

    function savePenalties(id) {
        const p1 = parseInt(document.getElementById(`p-${id}-1`)?.value || 0);
        const p2 = parseInt(document.getElementById(`p-${id}-2`)?.value || 0);
        const pen = loadPenalties(); pen[id] = {p1, p2};
        localStorage.setItem('wc2026_penalties', JSON.stringify(pen));
        renderMatches();
    }

    function getArgentinaDate() { return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Argentina/Buenos_Aires'}).format(new Date()); }
    function convertTime(stadium, time) {
        const offset = stadiumTimeZones[stadium] || 2;
        let [h,m] = time.split(':').map(Number), dayOff = 0;
        h += offset; if(h>=24){h-=24;dayOff=1;} else if(h<0){h+=24;dayOff=-1;}
        return {time:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`, dayOff};
    }
    function adjustDate(dateStr, off) { if(off===0) return dateStr; const d = new Date(dateStr); d.setDate(d.getDate()+off); return d.toISOString().split('T')[0]; }

    function getTransmission(m) {
        if(specialTransmissionIds.includes(m.id)) return 'Directv Sports / Telefe / TyC Sports / Disney+ (Plan Premium)';
        if(m.t1==='Argentina'||m.t2==='Argentina') return 'Directv Sports / Telefe / TV Pública / TyC Sports / Disney+ (Plan Premium)';
        return 'Directv Sports';
    }

    function renderMatches() {
        const container = document.getElementById('matches');
        const filter = filterSelect.value; container.innerHTML = '';
        let filtered = filter==='all' ? matchesData : matchesData.filter(m=>m.g===filter);
        if(dateFilter) filtered = filtered.filter(m=>m.d===dateFilter);
        if(dateFilter && filtered.length===0) { container.innerHTML = `<div class="empty-state"><h2>📅 ${formatDate(dateFilter)}</h2><h1>SIN PARTIDOS HOY</h1><button class="btn-today" onclick="clearDate()">Ver Todos</button></div>`; return; }
        if(filtered.length===0) { container.innerHTML='<p style="text-align:center;padding:20px;color:#666">No hay partidos.</p>'; return; }

        const scores = loadScores();
        const pen = loadPenalties();
        const teams = loadTeams();
        const isPlaceholder = name => !allTeams.includes(name);

        filtered.forEach(m => {
            const arg = convertTime(m.s, m.t);
            const dispDate = adjustDate(m.d, arg.dayOff);
            const dateDisp = arg.dayOff!==0 ? `${formatDate(dispDate)}*` : formatDate(m.d);
            const s = scores[m.id]||{s1:0,s2:0};
            const isKnockout = knockoutStages.includes(m.g);
            const isDraw = s.s1 === s.s2;

            let t1 = teams[`m${m.id}_t1`] || m.t1;
            let t2 = teams[`m${m.id}_t2`] || m.t2;

            const card = document.createElement('div'); card.className = 'match-card';
            let penaltyHtml = '';
            
            if (isKnockout && isDraw) {
                const p = pen[m.id] || {p1:0, p2:0};
                const winner = p.p1 > p.p2 ? t1 : (p.p2 > p.p1 ? t2 : 'Empate');
                penaltyHtml = `
                    <div class="penalty-box">
                        <h4>🥅 Definición por Penales</h4>
                        <div class="penalty-row">
                            <span>${t1}</span>
                            <input type="number" id="p-${m.id}-1" class="penalty-input" value="${p.p1}" min="0" max="10">
                            <span>-</span>
                            <input type="number" id="p-${m.id}-2" class="penalty-input" value="${p.p2}" min="0" max="10">
                            <span>${t2}</span>
                        </div>
                        <button class="penalty-btn" onclick="savePenalties('${m.id}')">✅ Definir</button>
                        <div class="penalty-result">${p.p1 !== p.p2 ? '🏆 Gana: ' + winner : '⏳ Ingrese resultado'}</div>
                    </div>`;
            }

            const team1Class = isPlaceholder(m.t1) && !teams[`m${m.id}_t1`] ? 'team-block selectable' : 'team-block';
            const team2Class = isPlaceholder(m.t2) && !teams[`m${m.id}_t2`] ? 'team-block selectable' : 'team-block';

            card.innerHTML = `
                <div class="match-header"><div class="match-date"><span>${dateDisp}</span><span class="time-ar">🇦🇷 ${arg.time} ART</span></div><span class="group-badge">${groupLabels[m.g]}</span></div>
                <div class="teams-row">
                    <div class="${team1Class}" ${team1Class.includes('selectable') ? `onclick="openTeamModal('${m.id}','t1')"` : ''}>
                        <span class="flag">${flags[t1]||'🏳️'}</span>
                        <span class="team-name">${t1}</span>
                    </div>
                    <div class="score-controller">
                        <div class="score-unit"><button class="score-btn minus" data-id="${m.id}" data-side="s1" data-d="-1">−</button><span class="score-display" id="d-${m.id}-1">${s.s1}</span><button class="score-btn plus" data-id="${m.id}" data-side="s1" data-d="1">+</button></div>
                        <span class="vs">VS</span>
                        <div class="score-unit"><button class="score-btn minus" data-id="${m.id}" data-side="s2" data-d="-1">−</button><span class="score-display" id="d-${m.id}-2">${s.s2}</span><button class="score-btn plus" data-id="${m.id}" data-side="s2" data-d="1">+</button></div>
                        <button class="clear-btn hidden" id="c-${m.id}">🗑️</button><span class="save-indicator" id="sav-${m.id}">✅</span>
                    </div>
                    <div class="${team2Class}" ${team2Class.includes('selectable') ? `onclick="openTeamModal('${m.id}','t2')"` : ''}>
                        <span class="flag">${flags[t2]||'🏳️'}</span>
                        <span class="team-name">${t2}</span>
                    </div>
                </div>
                <button class="btn-0-0" onclick="setScoreToZero('${m.id}')">⚽ Partido Sin Goles (0-0)</button>
                ${penaltyHtml}
                <div class="match-footer"><div class="stadium">📍 ${m.s}</div><div class="transmission">📺 <span>${getTransmission(m)}</span></div></div>`;
            container.appendChild(card);
        });

        container.onclick = e => {
            const btn = e.target.closest('.score-btn'), clr = e.target.closest('.clear-btn');
            if(btn) updateMatchScore(btn.dataset.id, btn.dataset.side, +btn.dataset.d);
            else if(clr) clearMatchScore(clr.id.replace('c-',''));
        };
    }

    function renderStandings() {
        const container = document.getElementById('standings'); container.innerHTML = '';
        const scores = loadScores(), filter = filterSelect.value;
        const groups = filter==='all' ? ['A','B','C','D','E','F','G','H','I','J','K','L'] : (['A','B','C','D','E','F','G','H','I','J','K','L'].includes(filter)?[filter]:[]);
        if(groups.length===0) { container.innerHTML='<p style="text-align:center;padding:20px;color:#666">Eliminatorias no tiene tabla de grupos.</p>'; return; }
        groups.forEach(g => {
            const teams = {};
            matchesData.filter(m=>m.g===g).forEach(m => {
                if(!teams[m.t1]) teams[m.t1]={name:m.t1,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
                if(!teams[m.t2]) teams[m.t2]={name:m.t2,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};
                const res = scores[m.id];
                if(res) {
                    const [a,b]=[res.s1,res.s2]; teams[m.t1].pj++; teams[m.t2].pj++;
                    teams[m.t1].gf+=a; teams[m.t1].gc+=b; teams[m.t2].gf+=b; teams[m.t2].gc+=a;
                    if(a>b){teams[m.t1].g++;teams[m.t1].pts+=3;teams[m.t2].p++;}
                    else if(b>a){teams[m.t2].g++;teams[m.t2].pts+=3;teams[m.t1].p++;}
                    else{teams[m.t1].e++;teams[m.t2].e++;teams[m.t1].pts++;teams[m.t2].pts++;}
                }
            });
            const sorted = Object.values(teams).sort((x,y)=>y.pts-x.pts||(y.gf-y.gc)-(x.gf-x.gc)||y.gf-x.gf);
            const div = document.createElement('div'); div.className='group-table';
            let html = `<div class="group-title">${groupLabels[g]}</div><table><thead><tr><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th></tr></thead><tbody>`;
            sorted.forEach((t,i)=>{ html += `<tr ${i<2?'class="top-2"':''}><td>${flags[t.name]||'🏳️'} ${t.name}</td><td>${t.pj}</td><td>${t.g}</td><td>${t.e}</td><td>${t.p}</td><td>${t.gf}</td><td>${t.gc}</td><td>${t.gf-t.gc}</td><td><strong>${t.pts}</strong></td></tr>`; });
            div.innerHTML = html+'</tbody></table>'; container.appendChild(div);
        });
    }

    function renderVenues() {
        const container = document.getElementById('venues'); if(container.children.length>0) return;
        const map = {}; matchesData.forEach(m=>{if(!map[m.s])map[m.s]={n:m.s,c:0};map[m.s].c++;});
        const grid = document.createElement('div'); grid.className='venue-grid';
        Object.values(map).sort((a,b)=>b.c-a.c).forEach(v=>{ grid.innerHTML += `<div class="venue-card"><h3>${v.n}</h3><p>🏟️ ${v.c} partidos</p></div>`; });
        container.appendChild(grid);
    }

    document.querySelectorAll('.tab-btn').forEach(btn=>{
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
            btn.classList.add('active'); const id = btn.dataset.view;
            document.getElementById(id).classList.add('active');
            if(id==='standings') renderStandings(); if(id==='venues') renderVenues();
        };
    });
    filterSelect.onchange = () => { renderMatches(); if(document.getElementById('standings').classList.contains('active')) renderStandings(); };
    todayBtn.onclick = () => { dateFilter = getArgentinaDate(); clearDateFilterBtn.classList.remove('hidden'); renderMatches(); };
    window.clearDate = () => { dateFilter = null; clearDateFilterBtn.classList.add('hidden'); renderMatches(); };
    clearDateFilterBtn.onclick = () => window.clearDate();
    resetBtn.onclick = () => { if(confirm('¿Borrar marcadores, penales y selección de equipos?')){localStorage.removeItem('wc2026_scores'); localStorage.removeItem('wc2026_penalties'); localStorage.removeItem('wc2026_teams'); renderMatches(); if(document.getElementById('standings').classList.contains('active')) renderStandings(); } };
    
    // Cerrar modal al hacer clic fuera
    document.getElementById('teamModal').onclick = (e) => { if(e.target.id==='teamModal') closeTeamModal(); };
    
    renderMatches();
</script>
</body>
</html>
